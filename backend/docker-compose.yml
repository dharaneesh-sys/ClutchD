services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: mechoncall
      POSTGRES_PASSWORD: mechoncall
      POSTGRES_DB: mechoncall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechoncall -d mechoncall"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://mechoncall:mechoncall@db:5432/mechoncall
      SYNC_DATABASE_URL: postgresql://mechoncall:mechoncall@db:5432/mechoncall
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-change-me-use-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DEV_AUTO_VERIFY_PROVIDERS: "true"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://mechoncall:mechoncall@db:5432/mechoncall
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-change-me-use-openssl-rand-hex-32}
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  uploads_data:
